asyncapi: 3.1.0

info:
  title: Bike Station Streaming Platform
  version: 1.0.0
  description: Real-time bike station analytics using Kafka and Flink.

servers:

  kafka:
    host: kafka:9092
    protocol: kafka

channels:

  bike.station.events:
    address: bike.station.events
    messages:
      BikeStationStatus:
        $ref: '#/components/messages/BikeStationStatus'

operations:

  publishBikeStation:
    action: send
    channel:
      $ref: '#/channels/bike.station.events'

  flinkConsumeStations:
    action: receive
    channel:
      $ref: '#/channels/bike.station.events'

components:

  messages:

    BikeStationStatus:

      payload:

        type: object

        properties:

          stationId:
            type: string

          bikesAvailable:
            type: integer

          emptyDocks:
            type: integer

          timestamp:
            type: string
            format: date-time